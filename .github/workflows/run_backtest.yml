name: Run Retrace-to-OB Backtest

on:
  workflow_dispatch: {}
  # Weekly structure only updates once a week, so a weekly cadence (after
  # Friday's close settles) is enough to keep this fresh.
  schedule:
    - cron: "0 7 * * 6"

permissions:
  contents: write

concurrency:
  group: run-backtest
  cancel-in-progress: false

jobs:
  run-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run backtest
        run: python scripts/backtest.py

      - name: Commit and push updated backtest data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- public/backtest_data.json; then
            echo "No change in backtest_data.json, skipping commit."
            exit 0
          fi
          git add public/backtest_data.json
          git commit -m "chore: update backtest data [skip ci]"

          # main can move while this job is running (a merged PR, or the
          # separate run_smc.yml workflow pushing public/smc_data.json on its
          # own schedule) -- rebase onto the latest tip and retry the push
          # instead of failing outright on a non-fast-forward.
          for attempt in 1 2 3 4 5; do
            git fetch origin main
            if git rebase origin/main; then
              if git push origin HEAD:main; then
                echo "Pushed successfully on attempt $attempt."
                exit 0
              fi
            else
              echo "Rebase conflict on attempt $attempt -- aborting and retrying."
              git rebase --abort
            fi
            echo "Push attempt $attempt failed, retrying after backoff..."
            sleep $((attempt * 3))
          done

          echo "Failed to push updated backtest data after multiple attempts."
          exit 1
